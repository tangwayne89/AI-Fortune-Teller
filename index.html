<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微探命 ✦ 命盤解析</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@300;400;500;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0B0F1E;
  --parchment: #F5E6C8;
  --gold: #D4A537;
  --gold-light: #F0C55A;
  --red: #C73B3B;
  --purple: #6B3FA0;
  --card-bg: rgba(255,255,255,0.04);
  --border: rgba(212,165,55,0.25);
  --glow: rgba(212,165,55,0.15);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--ink);
  color:var(--parchment);
  font-family:'Noto Serif TC',serif;
  min-height:100vh;
  overflow-x:hidden;
}
canvas#stars{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;opacity:.6;
}
.container{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 20px;}

/* ── HERO ── */
.hero{
  text-align:center;padding:80px 20px 60px;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(107,63,160,.3) 0%,transparent 70%);
}
.hero-title{
  font-family:'Ma Shan Zheng',cursive;
  font-size:clamp(3rem,8vw,6rem);
  color:var(--gold);
  text-shadow:0 0 40px rgba(212,165,55,.5),0 0 80px rgba(212,165,55,.2);
  letter-spacing:.2em;
  line-height:1.1;
}
.hero-sub{
  font-family:'Cinzel',serif;
  font-size:.8rem;letter-spacing:.4em;
  color:rgba(245,230,200,.4);
  margin:.8rem 0 1.2rem;
  text-transform:uppercase;
}
.hero-desc{
  font-size:.95rem;
  color:rgba(245,230,200,.6);
  max-width:500px;margin:0 auto 2.5rem;
  line-height:1.9;
}
.divider{
  display:flex;align-items:center;gap:12px;
  max-width:400px;margin:0 auto 3rem;
}
.divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.divider-sym{color:var(--gold);font-size:.9rem;}

/* ── FORM ── */
.form-card{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:16px;
  padding:40px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 60px rgba(107,63,160,.1);
}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.form-row.three{grid-template-columns:1fr 1fr 1fr;}
.form-row.single{grid-template-columns:1fr;}
@media(max-width:600px){
  .form-row,.form-row.three{grid-template-columns:1fr;}
  .form-card{padding:24px;}
}
.field label{
  display:block;font-size:.75rem;
  letter-spacing:.15em;color:var(--gold);
  margin-bottom:8px;text-transform:uppercase;
}
.field input,.field select{
  width:100%;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px 16px;
  color:var(--parchment);
  font-family:'Noto Serif TC',serif;
  font-size:.95rem;
  outline:none;
  transition:border-color .3s,box-shadow .3s;
  appearance:none;
  -webkit-appearance:none;
}
.field input:focus,.field select:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(212,165,55,.1);
}
.field select option{background:#1a1530;color:var(--parchment);}
.hour-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;margin-top:8px;
}
@media(max-width:500px){.hour-grid{grid-template-columns:repeat(3,1fr);}}
.hour-btn{
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 4px;
  cursor:pointer;
  text-align:center;
  transition:all .25s;
  color:var(--parchment);
  font-family:'Noto Serif TC',serif;
}
.hour-btn:hover{background:rgba(212,165,55,.1);border-color:var(--gold);}
.hour-btn.active{
  background:rgba(212,165,55,.2);
  border-color:var(--gold);
  color:var(--gold);
  box-shadow:0 0 12px rgba(212,165,55,.2);
}
.hour-btn .hz{font-size:.85rem;font-weight:500;}
.hour-btn .htime{font-size:.65rem;opacity:.6;margin-top:2px;}
.calc-btn{
  display:block;width:100%;margin-top:28px;
  padding:16px;
  background:linear-gradient(135deg,#8B4F1A,#D4A537,#8B4F1A);
  background-size:200% 100%;
  border:none;border-radius:10px;
  color:#0B0F1E;
  font-family:'Ma Shan Zheng',cursive;
  font-size:1.4rem;letter-spacing:.3em;
  cursor:pointer;
  transition:background-position .4s,transform .15s,box-shadow .3s;
  box-shadow:0 4px 24px rgba(212,165,55,.25);
}
.calc-btn:hover{
  background-position:100% 0;
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(212,165,55,.4);
}
.calc-btn:active{transform:translateY(0);}

/* ── RESULTS ── */
#results{display:none;margin-top:60px;}
#results.visible{display:block;}

.section-title{
  font-family:'Ma Shan Zheng',cursive;
  font-size:1.8rem;color:var(--gold);
  letter-spacing:.15em;margin-bottom:8px;
}
.section-subtitle{
  font-size:.8rem;color:rgba(245,230,200,.4);
  letter-spacing:.2em;margin-bottom:32px;
}

/* result header */
.result-header{
  text-align:center;padding:40px 20px;
  border:1px solid var(--border);
  border-radius:16px;
  background:var(--card-bg);
  margin-bottom:24px;
  position:relative;overflow:hidden;
}
.result-header::before{
  content:'';position:absolute;top:-50%;left:-50%;
  width:200%;height:200%;
  background:radial-gradient(ellipse at center,rgba(212,165,55,.05) 0%,transparent 60%);
  pointer-events:none;
}
.result-name{
  font-family:'Ma Shan Zheng',cursive;
  font-size:2rem;color:var(--parchment);margin-bottom:8px;
}
.result-date{font-size:.85rem;color:rgba(245,230,200,.5);letter-spacing:.1em;}
.result-palace-badge{
  display:inline-block;margin-top:16px;
  padding:8px 28px;
  border:1px solid var(--gold);
  border-radius:100px;
  font-family:'Cinzel',serif;
  font-size:.8rem;letter-spacing:.3em;
  color:var(--gold);
  background:rgba(212,165,55,.08);
}

/* star card */
.star-card{
  border:1px solid var(--border);
  border-radius:16px;
  padding:32px;
  background:var(--card-bg);
  margin-bottom:24px;
  position:relative;overflow:hidden;
  transition:border-color .3s;
}
.star-card:hover{border-color:rgba(212,165,55,.5);}
.star-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.star-name-row{display:flex;align-items:baseline;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
.star-zh{
  font-family:'Ma Shan Zheng',cursive;
  font-size:2.4rem;color:var(--gold);
  text-shadow:0 0 20px rgba(212,165,55,.4);
}
.star-en{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.25em;color:rgba(245,230,200,.4);}
.star-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.tag{
  padding:4px 12px;border-radius:100px;
  background:rgba(107,63,160,.2);
  border:1px solid rgba(107,63,160,.4);
  font-size:.75rem;color:rgba(245,230,200,.8);
  letter-spacing:.05em;
}
.star-desc{
  font-size:.92rem;line-height:1.9;
  color:rgba(245,230,200,.8);
  border-left:2px solid var(--gold);
  padding-left:16px;
}
.traits-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:12px;margin-top:20px;
}
@media(max-width:500px){.traits-grid{grid-template-columns:1fr;}}
.trait-item{
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  border-radius:8px;padding:12px 16px;
}
.trait-label{font-size:.7rem;color:var(--gold);letter-spacing:.15em;margin-bottom:4px;}
.trait-value{font-size:.88rem;color:var(--parchment);}

/* palace grid */
.palace-grid-wrap{margin-bottom:24px;}
.palace-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(4,auto);
  gap:2px;
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
}
.palace-cell{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(212,165,55,.1);
  padding:14px 10px;
  min-height:90px;
  position:relative;
  transition:background .3s;
}
.palace-cell:hover{background:rgba(212,165,55,.06);}
.palace-cell.life{
  background:rgba(212,165,55,.1);
  border-color:var(--gold) !important;
}
.palace-cell.life .palace-name{color:var(--gold);}
.palace-center{
  grid-column:2/4;grid-row:2/4;
  background:rgba(107,63,160,.1);
  border:1px solid rgba(107,63,160,.2) !important;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;text-align:center;
}
.palace-center-symbol{
  font-family:'Ma Shan Zheng',cursive;
  font-size:2.5rem;color:var(--purple);
  text-shadow:0 0 30px rgba(107,63,160,.5);
  margin-bottom:8px;
}
.palace-center-name{font-size:.8rem;color:rgba(245,230,200,.5);letter-spacing:.1em;}
.palace-name{
  font-size:.7rem;color:rgba(245,230,200,.45);
  letter-spacing:.1em;margin-bottom:6px;
}
.palace-di{
  font-size:.65rem;color:rgba(212,165,55,.6);
  margin-bottom:6px;
}
.palace-stars{display:flex;flex-wrap:wrap;gap:3px;}
.palace-star{
  font-size:.68rem;
  padding:2px 5px;
  border-radius:4px;
  background:rgba(107,63,160,.25);
  color:rgba(245,230,200,.8);
  letter-spacing:.02em;
}
.palace-star.main{
  background:rgba(212,165,55,.2);
  color:var(--gold);
  border:1px solid rgba(212,165,55,.3);
}

/* ── CHEMISTRY ── */
#compatibility{margin-top:60px;padding-top:40px;border-top:1px solid var(--border);}
.compat-header{text-align:center;margin-bottom:36px;}
.compat-form{
  display:grid;grid-template-columns:1fr 1fr;gap:20px;
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:16px;padding:32px;
  margin-bottom:24px;
}
@media(max-width:600px){.compat-form{grid-template-columns:1fr;}}
.compat-divider{
  display:flex;align-items:center;justify-content:center;
  font-family:'Ma Shan Zheng',cursive;
  font-size:2rem;color:var(--red);
  opacity:.6;
}
@media(max-width:600px){.compat-divider{display:none;}}
.compat-btn{
  display:block;width:100%;
  padding:14px;margin-top:0;
  background:rgba(199,59,59,.15);
  border:1px solid rgba(199,59,59,.4);
  border-radius:10px;
  color:var(--parchment);
  font-family:'Ma Shan Zheng',cursive;
  font-size:1.3rem;letter-spacing:.2em;
  cursor:pointer;
  transition:all .3s;
}
.compat-btn:hover{
  background:rgba(199,59,59,.25);
  border-color:var(--red);
  box-shadow:0 4px 20px rgba(199,59,59,.2);
}
#compat-result{display:none;}
#compat-result.visible{display:block;}
.compat-score-wrap{
  text-align:center;
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:16px;padding:40px;
  margin-bottom:24px;
}
.score-ring{
  width:140px;height:140px;
  margin:0 auto 20px;position:relative;
}
.score-ring svg{transform:rotate(-90deg);}
.score-ring .ring-bg{stroke:rgba(255,255,255,.06);}
.score-ring .ring-fill{
  stroke:var(--gold);
  stroke-linecap:round;
  transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
}
.score-num{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Cinzel',serif;
  font-size:2.2rem;color:var(--gold);
  font-weight:600;
}
.score-label{
  font-family:'Ma Shan Zheng',cursive;
  font-size:1.6rem;color:var(--parchment);
  margin-bottom:8px;
}
.score-desc{
  font-size:.88rem;line-height:1.8;
  color:rgba(245,230,200,.65);
  max-width:480px;margin:0 auto;
}
.compat-detail-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:16px;
}
@media(max-width:600px){.compat-detail-grid{grid-template-columns:1fr;}}
.compat-detail-card{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:12px;padding:20px;
}
.compat-person-name{
  font-family:'Ma Shan Zheng',cursive;
  font-size:1.3rem;color:var(--gold);
  margin-bottom:4px;
}
.compat-person-star{font-size:.82rem;color:rgba(245,230,200,.55);}

/* footer */
footer{
  text-align:center;padding:60px 20px;
  font-size:.75rem;
  color:rgba(245,230,200,.2);
  letter-spacing:.15em;
}

/* animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:1;}}
@keyframes glow{0%,100%{text-shadow:0 0 20px rgba(212,165,55,.3);}50%{text-shadow:0 0 40px rgba(212,165,55,.7),0 0 80px rgba(212,165,55,.3);}}

.fade-in{animation:fadeUp .6s ease both;}
.delay-1{animation-delay:.1s;}
.delay-2{animation-delay:.2s;}
.delay-3{animation-delay:.3s;}
.delay-4{animation-delay:.4s;}
.delay-5{animation-delay:.5s;}
.glow-anim{animation:glow 3s ease-in-out infinite;}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="container">

  <!-- NAV TO CHART -->
  <div style="display:flex;justify-content:flex-end;padding:16px 0 0">
    <a href="chart.html" style="font-size:.75rem;color:rgba(245,230,200,.45);text-decoration:none;border:1px solid rgba(212,165,55,.2);padding:7px 16px;border-radius:100px;letter-spacing:.15em;transition:all .2s" onmouseover="this.style.color='#D4A537';this.style.borderColor='#D4A537'" onmouseout="this.style.color='rgba(245,230,200,.45)';this.style.borderColor='rgba(212,165,55,.2)'">✨ 星座命格名片 →</a>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-sub">Zi Wei Dou Shu · 命盤解析</div>
    <h1 class="hero-title glow-anim">紫微探命</h1>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-sym">✦</span>
      <div class="divider-line"></div>
    </div>
    <p class="hero-desc">
      源自唐宋的皇家星命之學，以紫微星為帝星，<br>
      十四主星布於十二宮，揭示命運的輪廓與性格的底色。
    </p>
  </div>

  <!-- FORM -->
  <div class="form-card fade-in">
    <div class="form-row single">
      <div class="field">
        <label>姓名</label>
        <input type="text" id="f-name" placeholder="請輸入您的姓名" />
      </div>
    </div>
    <div class="form-row three">
      <div class="field">
        <label>出生年（西元）</label>
        <input type="number" id="f-year" placeholder="例：1990" min="1924" max="2030" />
      </div>
      <div class="field">
        <label>出生月</label>
        <select id="f-month">
          <option value="">選擇月份</option>
          <option value="1">1 月</option><option value="2">2 月</option>
          <option value="3">3 月</option><option value="4">4 月</option>
          <option value="5">5 月</option><option value="6">6 月</option>
          <option value="7">7 月</option><option value="8">8 月</option>
          <option value="9">9 月</option><option value="10">10 月</option>
          <option value="11">11 月</option><option value="12">12 月</option>
        </select>
      </div>
      <div class="field">
        <label>出生日</label>
        <select id="f-day">
          <option value="">選擇日期</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>出生時辰</label>
      <div class="hour-grid" id="hour-grid">
      </div>
    </div>
    <button class="calc-btn" onclick="calculate()">✦ 起命盤 ✦</button>
  </div>

  <!-- RESULTS -->
  <div id="results">
    <div class="result-header fade-in">
      <div class="result-name" id="r-name">—</div>
      <div class="result-date" id="r-date">—</div>
      <div class="result-palace-badge" id="r-badge">命宮：—</div>
    </div>

    <div class="star-card fade-in delay-1" id="star-card">
      <div class="star-name-row">
        <span class="star-zh" id="s-zh">—</span>
        <span class="star-en" id="s-en">—</span>
      </div>
      <div class="star-tags" id="s-tags"></div>
      <div class="star-desc" id="s-desc">—</div>
      <div class="traits-grid" id="s-traits"></div>
    </div>

    <div class="palace-grid-wrap fade-in delay-2">
      <div class="section-title">十二宮位</div>
      <div class="section-subtitle">TWELVE PALACES · 紫微命盤</div>
      <div class="palace-grid" id="palace-grid"></div>
    </div>
  </div>

  <!-- COMPATIBILITY -->
  <div id="compatibility">
    <div class="compat-header">
      <div class="section-title">緣份測算</div>
      <div class="section-subtitle">CHEMISTRY · 命格相合</div>
    </div>
    <div class="compat-form">
      <div>
        <div class="field" style="margin-bottom:14px">
          <label>Ta/她 的姓名</label>
          <input type="text" id="c-name" placeholder="對方姓名" />
        </div>
        <div class="field" style="margin-bottom:14px">
          <label>出生年</label>
          <input type="number" id="c-year" placeholder="例：1992" min="1924" max="2030" />
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
          <div class="field">
            <label>出生月</label>
            <select id="c-month">
              <option value="">月</option>
              <option value="1">1</option><option value="2">2</option>
              <option value="3">3</option><option value="4">4</option>
              <option value="5">5</option><option value="6">6</option>
              <option value="7">7</option><option value="8">8</option>
              <option value="9">9</option><option value="10">10</option>
              <option value="11">11</option><option value="12">12</option>
            </select>
          </div>
          <div class="field">
            <label>出生日</label>
            <select id="c-day">
              <option value="">日</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>時辰</label>
          <select id="c-hour">
            <option value="">選擇時辰</option>
          </select>
        </div>
      </div>
      <div class="compat-divider">緣</div>
      <div style="display:flex;flex-direction:column;justify-content:flex-end">
        <button class="compat-btn" onclick="calcCompat()">✦ 測算緣份 ✦</button>
      </div>
    </div>

    <div id="compat-result">
      <div class="compat-score-wrap fade-in">
        <div class="score-ring">
          <svg width="140" height="140" viewBox="0 0 140 140">
            <circle class="ring-bg" cx="70" cy="70" r="58" fill="none" stroke-width="8"/>
            <circle class="ring-fill" id="ring-fill" cx="70" cy="70" r="58" fill="none" stroke-width="8"
              stroke-dasharray="364.4" stroke-dashoffset="364.4"/>
          </svg>
          <div class="score-num" id="score-num">0</div>
        </div>
        <div class="score-label" id="score-label">—</div>
        <div class="score-desc" id="score-desc">—</div>
      </div>
      <div class="compat-detail-grid">
        <div class="compat-detail-card fade-in delay-1">
          <div class="compat-person-name" id="cd-name1">—</div>
          <div class="compat-person-star" id="cd-star1">—</div>
        </div>
        <div class="compat-detail-card fade-in delay-2">
          <div class="compat-person-name" id="cd-name2">—</div>
          <div class="compat-person-star" id="cd-star2">—</div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>✦ 紫微斗數 · 僅供娛樂參考 · 命運掌握在自己手中 ✦</p>
  </footer>

</div><!-- /container -->

<script>
// ─────────────────────────────────────────
//  STAR BACKGROUND
// ─────────────────────────────────────────
(function(){
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let W,H,stars=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;init();}
  function init(){
    stars=[];
    for(let i=0;i<180;i++){
      stars.push({x:Math.random()*W,y:Math.random()*H,
        r:Math.random()*1.2+.2,
        a:Math.random(),da:(.3+Math.random()*.7)*(Math.random()<.5?1:-1)*.005,
        speed:Math.random()*.08+.01});
    }
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;
      s.y-=s.speed;if(s.y<-2)s.y=H+2;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(212,165,55,${s.a*0.8})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize();draw();
})();

  2020:[1,25],2021:[2,12],2022:[2,1],2023:[1,22],2024:[2,10],2025:[1,29],
  2026:[2,17],2027:[2,6],2028:[1,26],2029:[2,13],2030:[2,3]
};

function gregToLunar(year, month, day){
  let lunarYear = year;
  let sf = SF[year];
  if(!sf) return null;
  const sfDate = new Date(year, sf[0]-1, sf[1]);
  const inputDate = new Date(year, month-1, day);
  let diff = Math.floor((inputDate - sfDate)/86400000);
  if(diff < 0){
    lunarYear = year - 1;
    sf = SF[lunarYear];
    if(!sf) return null;
    const prevSf = new Date(lunarYear, sf[0]-1, sf[1]);
    diff = Math.floor((inputDate - prevSf)/86400000);
  }
  // approximate: alternate 30/29 day months
  const monthLen = [30,29,30,29,30,29,30,29,30,29,30,29,30];
  let lMonth=1, rem=diff;
  for(let m=0;m<13;m++){
    if(rem < monthLen[m]){ lMonth=m+1; break; }
    rem -= monthLen[m];
  }
  const lDay = rem+1;
  return {lunarYear, lunarMonth:lMonth, lunarDay:Math.min(lDay,30)};
}

const DIZHI = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const TIANGAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const WUXING_NAME = ['金','火','木','土','水'];
const NAYIN = [0,1,2,3,0,1,4,3,0,2,4,3,1,2,4,0,1,2,3,0,1,4,3,0,2,4,3,1,2,4];
// 0=金4局,1=火6局,2=木3局,3=土5局,4=水2局
const PHASE_NUM = [4,6,3,5,2];
const PHASE_NAME = ['金四局','火六局','木三局','土五局','水二局'];
// Five Tiger (五虎遁年): yearStem→寅月stem
const YINSTEM = [2,4,6,8,0,2,4,6,8,0]; // 甲己→丙(2), 乙庚→戊(4), 丙辛→庚(6), 丁壬→壬(8), 戊癸→甲(0)

function getYearStem(y){ return (y-4+400)%10; }
function getYearBranch(y){ return (y-4+4800)%12; }

function getLifePalace(lMonth, hourIdx){
  return ((lMonth+1)%12 - hourIdx + 12)%12;
}

function getFivePhase(lYear, lifePalace){
  const ys = getYearStem(lYear);
  const yinStem = YINSTEM[ys];
  const offset = (lifePalace - 2 + 12)%12;
  const mingGongStem = (yinStem + offset)%10;
  const cyclePos = (mingGongStem*6 + (12-lifePalace)*5)%60;
  const pairIdx = Math.floor(cyclePos/2)%30;
  return NAYIN[pairIdx]; // index into PHASE_NUM/PHASE_NAME
}

function getZiweiPos(lDay, phaseIdx){
  const n = PHASE_NUM[phaseIdx];
  return (Math.floor((lDay-1)/n)+2)%12;
}

const PALACE_NAMES = ['命宮','兄弟宮','夫妻宮','子女宮','財帛宮','疾厄宮','遷移宮','僕役宮','事業宮','田宅宮','福德宮','父母宮'];
// 12-palace grid positions (row,col) in 4×4 with center 2×2 empty
// Layout:
// [11父母][0命宮][1兄弟][2夫妻]
// [10福德][CENTER-------][3子女]
// [9田宅][CENTER--------][4財帛]
// [8事業][7僕役][6遷移][5疾厄]
const GRID_POS = [
  {row:0,col:1},{row:0,col:2},{row:0,col:3},{row:1,col:3},
  {row:2,col:3},{row:3,col:3},{row:3,col:2},{row:3,col:1},
  {row:3,col:0},{row:2,col:0},{row:1,col:0},{row:0,col:0}
];

function getStarsInPalace(palaceIdx, ziweiPos){
  const diff = (palaceIdx - ziweiPos + 12)%12;
  const configs = {0:'紫微,七殺',3:'破軍',4:'廉貞',6:'天府',7:'天同,太陰',8:'武曲,貪狼',9:'太陽,巨門',10:'天相',11:'天機,天梁'};
  return configs[diff] ? configs[diff].split(',') : [];
}

function getStarConfig(lifePalace, ziweiPos){
  const diff = (lifePalace - ziweiPos + 12)%12;
  if([1,2,5].includes(diff)) return ['empty1', STAR_CONFIGS['empty1']];
  return [diff, STAR_CONFIGS[diff]];
}

let lastResult = null;

function calculate(){
  const name = document.getElementById('f-name').value.trim() || '命主';
  const year = parseInt(document.getElementById('f-year').value);
  const month = parseInt(document.getElementById('f-month').value);
  const day = parseInt(document.getElementById('f-day').value);
  const hourIdx = selectedHour;

  if(!year||!month||!day){ alert('請填寫完整出生年月日'); return; }
  if(hourIdx<0){ alert('請選擇出生時辰'); return; }
  if(year<1924||year>2030){ alert('目前支援 1924–2030 年'); return; }

  const lunar = gregToLunar(year,month,day);
  if(!lunar){ alert('無法計算農曆，請確認日期'); return; }

  const lp = getLifePalace(lunar.lunarMonth, hourIdx);
  const phaseIdx = getFivePhase(lunar.lunarYear, lp);
  const zPos = getZiweiPos(lunar.lunarDay, phaseIdx);
  const [cfgKey, cfg] = getStarConfig(lp, zPos);
  const yearStem = getYearStem(lunar.lunarYear);
  const yearBranch = getYearBranch(lunar.lunarYear);

  lastResult = {name, year, month, day, hourIdx, lunar, lp, phaseIdx, zPos, cfgKey, cfg, yearStem, yearBranch};

  renderResults(lastResult);
}

function renderResults(r){
  const {name,year,month,day,hourIdx,lunar,lp,phaseIdx,zPos,cfg} = r;
  const hourName = HOURS[hourIdx].zh;
  const lpDizhi = DIZHI[lp];
  const phaseName = PHASE_NAME[phaseIdx];

  // Header
  document.getElementById('r-name').textContent = name;
  document.getElementById('r-date').textContent =
    `${year}年${month}月${day}日 · ${hourName}時 · 農曆${lunar.lunarYear}年${lunar.lunarMonth}月${lunar.lunarDay}日`;
  document.getElementById('r-badge').textContent =
    `命宮：${lpDizhi}宮 · ${phaseName} · 紫微在${DIZHI[zPos]}`;

  // Star card
  document.getElementById('s-zh').textContent = cfg.zh;
  document.getElementById('s-en').textContent = cfg.en;
  document.getElementById('s-desc').textContent = cfg.desc;

  const tagsEl = document.getElementById('s-tags');
  tagsEl.innerHTML = '';
  cfg.tags.forEach(t=>{ const d=document.createElement('div');d.className='tag';d.textContent=t;tagsEl.appendChild(d); });

  const traitsEl = document.getElementById('s-traits');
  traitsEl.innerHTML = '';
  cfg.traits.forEach(t=>{
    traitsEl.innerHTML += `<div class="trait-item"><div class="trait-label">${t.l}</div><div class="trait-value">${t.v}</div></div>`;
  });

  // Palace grid
  renderGrid(lp, zPos);

  const res = document.getElementById('results');
  res.classList.add('visible');
  res.scrollIntoView({behavior:'smooth',block:'start'});
}

function renderGrid(lifePalace, ziweiPos){
  const grid = document.getElementById('palace-grid');
  grid.innerHTML='';
  // Create 4×4 cells
  const cells = Array.from({length:16},()=>null);
  // Place palaces (index 0=命宮, goes counterclockwise starting at GRID_POS[0])
  for(let i=0;i<12;i++){
    const pos = GRID_POS[i];
    const palaceActualIdx = (lifePalace + i)%12; // actual 地支 index
    const palaceName = PALACE_NAMES[i];
    const isLife = i===0;
    const stars = getStarsInPalace(palaceActualIdx, ziweiPos);
    cells[pos.row*4+pos.col] = {name:palaceName, dizhi:DIZHI[palaceActualIdx], stars, isLife};
  }
  // Render
  for(let row=0;row<4;row++){
    for(let col=0;col<4;col++){
      // Center 2×2
      if((row===1||row===2)&&(col===1||col===2)){
        if(row===1&&col===1){
          // center cell spanning 2×2
          const center = document.createElement('div');
          center.className='palace-cell palace-center';
          center.style.gridColumn='2/4';center.style.gridRow='2/4';
          center.innerHTML=`
            <div class="palace-center-symbol">紫微</div>
            <div class="palace-center-name">命盤中宮</div>
          `;
          grid.appendChild(center);
        }
        continue;
      }
      const cellData = cells[row*4+col];
      if(!cellData) continue;
      const cell = document.createElement('div');
      cell.className = 'palace-cell' + (cellData.isLife?' life':'');
      cell.style.gridColumn=`${col+1}`;
      cell.style.gridRow=`${row+1}`;
      let starsHtml = cellData.stars.map((s,i)=>
        `<span class="palace-star${i===0?' main':''}">${s}</span>`
      ).join('');
      cell.innerHTML=`
        <div class="palace-name">${cellData.name}</div>
        <div class="palace-di">${cellData.dizhi}</div>
        <div class="palace-stars">${starsHtml||'<span style="font-size:.65rem;opacity:.3">空宮</span>'}</div>
      `;
      grid.appendChild(cell);
    }
  }
}

// ─────────────────────────────────────────
//  COMPATIBILITY
// ─────────────────────────────────────────
const SIX_HE = [[0,1],[2,11],[3,10],[4,9],[5,8],[6,7]]; // 六合
const SAN_HE = [[0,4,8],[1,5,9],[2,6,10],[3,7,11]];     // 三合
const CHONG = [[0,6],[1,7],[2,8],[3,9],[4,10],[5,11]];   // 相沖

function getRelation(a, b){
  for(const [x,y] of SIX_HE) if((a===x&&b===y)||(a===y&&b===x)) return '六合';
  for(const g of SAN_HE) if(g.includes(a)&&g.includes(b)) return '三合';
  for(const [x,y] of CHONG) if((a===x&&b===y)||(a===y&&b===x)) return '相沖';
  return '中性';
}

const COMPAT_DATA = {
  '六合': {score:92,label:'命中注定',color:'#D4A537',
    desc:'六合之緣，如天地呼應。你們在性格上天生互補，彼此的存在填補了對方的缺憾。相處自然流暢，共同生活充滿默契。這是紫微命學中最美好的緣份之一。'},
  '三合': {score:85,label:'深度共鳴',color:'#9B6FD9',
    desc:'三合之局，五行相生。你們擁有相近的人生觀與價值觀，在事業與生活上能夠互相成就。雖不如六合般天衣無縫，但長遠來看反而更加穩固持久。'},
  '相沖': {score:68,label:'激情碰撞',color:'#C73B3B',
    desc:'相沖之氣，如火與冰。你們在一起充滿張力與激情，彼此刺激對方成長，卻也容易摩擦。這段關係考驗耐性，但若能化衝為合，往往能共創非凡。'},
  '中性': {score:72,label:'平穩相伴',color:'#7EB5C8',
    desc:'命格平和，緣份自然。你們之間沒有特別強烈的吸引或衝突，相處舒適而自在。感情的深度取決於彼此的用心經營，是最需要主動付出的緣份。'},
};

function calcCompat(){
  const name2 = document.getElementById('c-name').value.trim() || '對方';
  const year2 = parseInt(document.getElementById('c-year').value);
  const month2 = parseInt(document.getElementById('c-month').value);
  const day2 = parseInt(document.getElementById('c-day').value);
  const hourIdx2 = parseInt(document.getElementById('c-hour').value);

  if(!year2||!month2||!day2||isNaN(hourIdx2)){ alert('請填寫對方完整資訊'); return; }

  const lunar2 = gregToLunar(year2,month2,day2);
  if(!lunar2){ alert('無法計算對方農曆日期'); return; }

  const lp2 = getLifePalace(lunar2.lunarMonth, hourIdx2);
  const phaseIdx2 = getFivePhase(lunar2.lunarYear, lp2);
  const zPos2 = getZiweiPos(lunar2.lunarDay, phaseIdx2);
  const [cfgKey2, cfg2] = getStarConfig(lp2, zPos2);

  if(!lastResult){ alert('請先為自己起命盤'); return; }

  const {lp:lp1, cfgKey:cfgKey1, cfg:cfg1, name:name1} = lastResult;

  const relation = getRelation(lp1, lp2);
  const cd = COMPAT_DATA[relation];

  // score with minor variation based on stars
  const starBonus = cfgKey1===cfgKey2 ? -5 : 0;
  const finalScore = Math.min(99, Math.max(40, cd.score + starBonus + Math.floor(Math.random()*6)-2));

  document.getElementById('cd-name1').textContent = name1;
  document.getElementById('cd-star1').textContent = `命宮${DIZHI[lp1]} · ${cfg1.zh}`;
  document.getElementById('cd-name2').textContent = name2;
  document.getElementById('cd-star2').textContent = `命宮${DIZHI[lp2]} · ${cfg2.zh}`;
  document.getElementById('score-label').textContent = cd.label;
  document.getElementById('score-desc').textContent = cd.desc;
  document.getElementById('score-num').textContent = finalScore;

  // Animate ring
  const ring = document.getElementById('ring-fill');
  const circum = 364.4;
  ring.style.stroke = cd.color;
  ring.style.strokeDashoffset = circum;
  setTimeout(()=>{
    ring.style.strokeDashoffset = circum * (1 - finalScore/100);
  },100);

  const cr = document.getElementById('compat-result');
  cr.classList.add('visible');
  cr.scrollIntoView({behavior:'smooth',block:'start'});
}
